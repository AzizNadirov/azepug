{% extends 'blog/blog_list.html'%}
{% block title %} {{post.title}} {% endblock %}
{% block body%}
    <h2><i>{{post.title}}</i></h2>
    <p class="text-lg-right"> <i>Müəllif: {{post.author}} Tarix:{{post.date_created}}</i></p>
    <div class="text-sm-center">
        {{post.content}}
        <br>
        <hr>
        <a class = "btn btn-secondary" href="{ % url 'blog:update_post' post.id %}">
            Redaktə et
        </a>
    </div>
{% endblock %}
